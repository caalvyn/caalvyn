name: Update profile card

on:
  schedule:
    - cron: "17 6 * * *"   # daily at 06:17 UTC
  push:
    branches: [main]
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVG cards
        env:
          # Prefer a personal token (secret GH_STATS_TOKEN) for fuller stats;
          # fall back to the automatic Action token.
          GITHUB_TOKEN: ${{ secrets.GH_STATS_TOKEN || secrets.GITHUB_TOKEN }}
          GH_USER: caalvyn
        run: python3 generate.py

      - name: Commit regenerated cards
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh profile stats [skip ci]"
            git push
          fi
